<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Ular 3D</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#06120C" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ular3D" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg: #06120C; --panel: rgba(13,30,21,0.7); --line: #16382576;
      --phos: #3DDC7A; --phos-dim: #1f6b40; --ink: #CFEFDC;
      --tech: "Orbitron", -apple-system, sans-serif;
      --ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--ink); font-family: var(--ui);
      display: flex; flex-direction: column; align-items: center; touch-action: none;
      background-image: radial-gradient(120% 90% at 50% 0%, rgba(61,220,122,0.10), transparent 60%);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 40; box-shadow: inset 0 0 140px 30px rgba(0,0,0,0.55); }

    .stage { width: 100%; max-width: 460px; margin: 0 auto; padding: 12px 14px 0; display: flex; flex-direction: column; align-items: center; }
    .title { font-family: var(--tech); font-weight: 900; font-size: 22px; color: var(--phos); letter-spacing: 3px;
      text-shadow: 0 0 14px rgba(61,220,122,0.55); margin: 4px 0 0; }
    .titlesub { font-family: var(--tech); font-weight: 500; font-size: 9px; color: var(--phos-dim); letter-spacing: 4px; margin-bottom: 12px; }

    .hud { width: 100%; display: flex; justify-content: space-between; font-family: var(--tech); font-size: 12px; letter-spacing: 1px; margin-bottom: 8px; }
    .hud .lbl { color: var(--phos-dim); font-size: 8px; letter-spacing: 2px; }
    .hud b { color: var(--phos); font-size: 18px; }

    .arena { position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: 16px; overflow: hidden;
      border: 1px solid var(--line); box-shadow: 0 0 0 4px #040d08, 0 18px 50px rgba(0,0,0,0.6); }
    canvas#gl { display: block; width: 100%; height: 100%; }

    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5,14,9,0.72); backdrop-filter: blur(3px); text-align: center; padding: 20px; gap: 12px; }
    .overlay.hide { display: none; }
    .overlay .big { font-family: var(--tech); font-weight: 700; font-size: 18px; color: var(--phos); text-shadow: 0 0 12px rgba(61,220,122,0.5); }
    .overlay .small { font-size: 12px; color: var(--ink); line-height: 1.7; opacity: 0.85; }
    .overlay .cta { font-family: var(--tech); font-size: 11px; letter-spacing: 2px; color: var(--phos); }
    .blink { animation: blink 1.1s steps(2, start) infinite; }
    @keyframes blink { to { opacity: 0.25; } }

    .pad { display: grid; grid-template-columns: repeat(3, 58px); grid-template-rows: repeat(3, 58px); gap: 9px; margin: 16px 0 6px; }
    .pad button { font-family: var(--ui); font-size: 18px; color: var(--phos); background: var(--panel); backdrop-filter: blur(4px);
      border: 1px solid var(--line); border-radius: 12px; cursor: pointer; transition: transform 0.08s, background 0.12s; }
    .pad button:active { transform: scale(0.9); background: rgba(30,107,64,0.4); }
    .pad .up { grid-column: 2; grid-row: 1; } .pad .left { grid-column: 1; grid-row: 2; }
    .pad .right { grid-column: 3; grid-row: 2; } .pad .down { grid-column: 2; grid-row: 3; }
    .pad .mid { grid-column: 2; grid-row: 2; border-style: dashed; font-family: var(--tech); font-size: 8px; letter-spacing: 1px; color: var(--phos-dim); }
    .hint { font-family: var(--tech); font-size: 7px; color: var(--phos-dim); letter-spacing: 2px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="stage">
    <div class="title">ULAR 3D</div>
    <div class="titlesub">NEON ARCADE</div>

    <div class="hud">
      <div><div class="lbl">SKOR</div><b id="score">0</b></div>
      <div style="text-align:right"><div class="lbl">TERTINGGI</div><b id="best">0</b></div>
    </div>

    <div class="arena">
      <canvas id="gl"></canvas>
      <div class="overlay" id="overlay">
        <div class="big" id="ovTitle">SIAP MAIN?</div>
        <div class="small" id="ovBody">Geser layar atau pakai tombol arah.</div>
        <div class="cta blink" id="ovCta">&#9654; TAP UNTUK MULAI</div>
      </div>
    </div>

    <div class="pad">
      <button class="up" data-dir="up" aria-label="Atas">&#9650;</button>
      <button class="left" data-dir="left" aria-label="Kiri">&#9664;</button>
      <button class="mid" id="pauseBtn">JEDA</button>
      <button class="right" data-dir="right" aria-label="Kanan">&#9654;</button>
      <button class="down" data-dir="down" aria-label="Bawah">&#9660;</button>
    </div>
    <div class="hint">SWIPE PADA ARENA JUGA BISA</div>
  </div>

  <script>
  (function () {
    const overlay = document.getElementById("overlay");
    const ovTitle = document.getElementById("ovTitle");
    const ovBody = document.getElementById("ovBody");
    const ovCta = document.getElementById("ovCta");
    function showOverlay(t, b, c) { ovTitle.innerHTML = t; ovBody.innerHTML = b || ""; ovCta.innerHTML = c || ""; overlay.classList.remove("hide"); }
    function hideOverlay() { overlay.classList.add("hide"); }

    if (typeof THREE === "undefined") {
      showOverlay("GRAFIK 3D GAGAL DIMUAT", "Butuh internet saat pertama kali membuka game untuk mengunduh mesin 3D. Sambungkan internet lalu buka ulang.", "");
      return;
    }

    // ---- Board ----
    const COLS = 15, ROWS = 15;
    const HALF_X = (COLS - 1) / 2, HALF_Z = (ROWS - 1) / 2;
    const Y = 0.45;
    function world(c) { return new THREE.Vector3(c.x - HALF_X, Y, c.y - HALF_Z); }

    // ---- Renderer / scene / camera ----
    const canvas = document.getElementById("gl");
    const arena = canvas.parentElement;
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x06120c);
    scene.fog = new THREE.Fog(0x06120c, 20, 44);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    const camDir = new THREE.Vector3(0, 1.0, 0.86).normalize();
    const camTarget = new THREE.Vector3(0, 0, 0);

    function fitCamera() {
      const w = arena.clientWidth || 360, h = arena.clientHeight || 360;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      const vFov = camera.fov * Math.PI / 180;
      const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
      const S = Math.max(COLS, ROWS) + 2.0;           // board + margin
      const dist = (S / 2) / Math.tan(Math.min(vFov, hFov) / 2) * 1.18;
      camera.position.copy(camTarget).addScaledVector(camDir, dist);
      camera.lookAt(camTarget);
      camera.updateProjectionMatrix();
    }
    if (window.ResizeObserver) new ResizeObserver(fitCamera).observe(arena);
    window.addEventListener("resize", fitCamera);

    // ---- Lights ----
    scene.add(new THREE.HemisphereLight(0x9fffd0, 0x07140d, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 1.05);
    key.position.set(9, 18, 7);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    key.shadow.camera.near = 1; key.shadow.camera.far = 60;
    key.shadow.camera.left = -12; key.shadow.camera.right = 12;
    key.shadow.camera.top = 12; key.shadow.camera.bottom = -12;
    key.shadow.bias = -0.0005;
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x3ddc7a, 0.35);
    rim.position.set(-8, 6, -9);
    scene.add(rim);

    // ---- Floor + grid + walls ----
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x0b2016, roughness: 0.95, metalness: 0.05 });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(COLS + 1.4, ROWS + 1.4), floorMat);
    floor.rotation.x = -Math.PI / 2; floor.position.y = 0; floor.receiveShadow = true;
    scene.add(floor);

    const grid = new THREE.GridHelper(COLS, COLS, 0x2f7d52, 0x163826);
    grid.position.y = 0.02; grid.material.opacity = 0.5; grid.material.transparent = true;
    scene.add(grid);

    const wallMat = new THREE.MeshStandardMaterial({ color: 0x103826, roughness: 0.6, metalness: 0.2, emissive: 0x0c3a22, emissiveIntensity: 0.5 });
    const wallH = 0.6, span = COLS + 0.6, edge = (ROWS) / 2 + 0.3;
    [[0, edge], [0, -edge]].forEach(([x, z]) => { const m = new THREE.Mesh(new THREE.BoxGeometry(span + 0.6, wallH, 0.6), wallMat); m.position.set(x, wallH / 2, z); m.castShadow = true; m.receiveShadow = true; scene.add(m); });
    [[edge, 0], [-edge, 0]].forEach(([x, z]) => { const m = new THREE.Mesh(new THREE.BoxGeometry(0.6, wallH, span + 0.6), wallMat); m.position.set(x, wallH / 2, z); m.castShadow = true; m.receiveShadow = true; scene.add(m); });

    // ---- Shared snake assets ----
    const segGeo = new THREE.BoxGeometry(0.82, 0.82, 0.82);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x37c873, roughness: 0.35, metalness: 0.25, emissive: 0x0a4a28, emissiveIntensity: 0.35 });
    const headMat = new THREE.MeshStandardMaterial({ color: 0x7dffb0, roughness: 0.25, metalness: 0.3, emissive: 0x1f7d4a, emissiveIntensity: 0.6 });
    const eyeGeo = new THREE.SphereGeometry(0.1, 12, 12);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x06120c, roughness: 0.4 });

    // ---- Food ----
    const foodGeo = new THREE.IcosahedronGeometry(0.46, 0);
    const foodMat = new THREE.MeshStandardMaterial({ color: 0xff7a3d, roughness: 0.3, metalness: 0.4, emissive: 0xff5a1f, emissiveIntensity: 0.9 });
    const foodMesh = new THREE.Mesh(foodGeo, foodMat);
    foodMesh.castShadow = true;
    scene.add(foodMesh);
    const foodLight = new THREE.PointLight(0xff7a3d, 0.9, 9, 2);
    scene.add(foodLight);

    // ---- Particles (eat burst) ----
    const pGeo = new THREE.BoxGeometry(0.14, 0.14, 0.14);
    const pMat = new THREE.MeshStandardMaterial({ color: 0xffa766, emissive: 0xff5a1f, emissiveIntensity: 0.9, roughness: 0.4 });
    const particles = [];
    function burst(pos) {
      for (let i = 0; i < 14; i++) {
        const m = new THREE.Mesh(pGeo, pMat);
        m.position.copy(pos);
        scene.add(m);
        particles.push({ m, life: 0.6, v: new THREE.Vector3((Math.random() - 0.5) * 7, Math.random() * 6 + 2, (Math.random() - 0.5) * 7) });
      }
    }
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.v.y -= 16 * dt;
        p.m.position.addScaledVector(p.v, dt);
        const s = Math.max(0, p.life / 0.6);
        p.m.scale.setScalar(s);
        if (p.life <= 0) { scene.remove(p.m); particles.splice(i, 1); }
      }
    }

    // ---- Game state ----
    let snake, segMeshes, dir, nextDir, food, score, state, tickMs, acc, last;
    let best = 0;
    const KEY = "ular3d.highscore.v1";
    try { best = parseInt(localStorage.getItem(KEY) || "0", 10) || 0; } catch (e) {}
    document.getElementById("best").textContent = best;
    function saveBest() { try { localStorage.setItem(KEY, String(best)); } catch (e) {} }

    function clearMeshes() { if (segMeshes) segMeshes.forEach(m => scene.remove(m)); segMeshes = []; }
    function addSegment(cell, isHead) {
      const m = new THREE.Mesh(segGeo, isHead ? headMat : bodyMat);
      m.castShadow = true; m.receiveShadow = true;
      const p = world(cell); m.position.copy(p);
      m.userData.from = p.clone(); m.userData.to = p.clone();
      if (isHead) {
        const eL = new THREE.Mesh(eyeGeo, eyeMat), eR = new THREE.Mesh(eyeGeo, eyeMat);
        eL.position.set(-0.2, 0.18, 0.34); eR.position.set(0.2, 0.18, 0.34);
        m.add(eL); m.add(eR);
      }
      scene.add(m); segMeshes.push(m);
      return m;
    }

    function reset() {
      snake = [{ x: 7, y: 7 }, { x: 6, y: 7 }, { x: 5, y: 7 }];
      dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
      score = 0; tickMs = 170; acc = 0;
      clearMeshes();
      snake.forEach((c, i) => addSegment(c, i === 0));
      segMeshes[0].rotation.y = Math.atan2(dir.x, dir.y);
      placeFood();
      document.getElementById("score").textContent = score;
    }
    function placeFood() {
      while (true) {
        const f = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 };
        if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; const p = world(f); foodMesh.position.copy(p); foodLight.position.set(p.x, p.y + 1.3, p.z); return; }
      }
    }

    function setDir(nx, ny) { if (nx === -dir.x && ny === -dir.y) return; nextDir = { x: nx, y: ny }; }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
      snake.unshift(head);
      let grew = false;
      if (head.x === food.x && head.y === food.y) {
        grew = true; score++; document.getElementById("score").textContent = score;
        if (score > best) { best = score; document.getElementById("best").textContent = best; saveBest(); }
        if (tickMs > 80) tickMs -= 4;
        burst(foodMesh.position);
        placeFood();
      } else {
        snake.pop();
      }
      if (grew) addSegment(snake[snake.length - 1], false);
      // retarget all meshes for interpolation
      for (let i = 0; i < segMeshes.length; i++) {
        const m = segMeshes[i];
        m.userData.from = m.userData.to.clone();
        m.userData.to = world(snake[i]);
      }
      segMeshes[0].rotation.y = Math.atan2(dir.x, dir.y);
    }

    function gameOver() {
      state = "over";
      showOverlay("GAME OVER", "Skor <b style='color:var(--phos)'>" + score + "</b> &nbsp;&middot;&nbsp; Tertinggi " + best, "&#9654; TAP UNTUK ULANG");
    }

    // ---- Loop ----
    function startGame() { reset(); state = "playing"; hideOverlay(); last = performance.now(); requestAnimationFrame(loop); }
    function loop(now) {
      if (state !== "playing") { renderScene(now, 0); return; }
      const dt = Math.min((now - last) / 1000, 0.1); last = now; acc += dt * 1000;
      while (acc >= tickMs) { step(); acc -= tickMs; if (state !== "playing") break; }
      const t = state === "playing" ? Math.min(acc / tickMs, 1) : 1;
      renderScene(now, t);
      if (state === "playing") requestAnimationFrame(loop);
    }

    const _tmp = new THREE.Vector3();
    function renderScene(now, t) {
      // interpolate snake segments
      for (let i = 0; i < segMeshes.length; i++) {
        const m = segMeshes[i];
        _tmp.copy(m.userData.from).lerp(m.userData.to, t);
        m.position.copy(_tmp);
      }
      // food life
      const e = now * 0.001;
      foodMesh.rotation.x = e * 1.2; foodMesh.rotation.y = e * 1.6;
      foodMesh.position.y = Y + 0.12 + Math.sin(e * 3) * 0.12;
      foodMesh.scale.setScalar(1 + Math.sin(e * 5) * 0.06);
      foodLight.intensity = 0.8 + Math.sin(e * 5) * 0.25;
      // gentle camera sway
      const sway = Math.sin(now * 0.00018) * 0.06;
      const d = camDir.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), sway);
      const dist = camera.position.distanceTo(camTarget);
      camera.position.copy(camTarget).addScaledVector(d, dist);
      camera.lookAt(camTarget);
      renderer.render(scene, camera);
    }
    function renderLoopIdle() { if (state !== "playing") { renderScene(performance.now(), 1); requestAnimationFrame(renderLoopIdle); } }

    // ---- Input ----
    function primaryTap() {
      if (state === "ready" || state === "over") startGame();
      else if (state === "paused") { state = "playing"; hideOverlay(); last = performance.now(); requestAnimationFrame(loop); }
    }
    overlay.addEventListener("click", primaryTap);
    document.querySelectorAll(".pad button[data-dir]").forEach(b => {
      b.addEventListener("click", () => {
        if (state !== "playing") primaryTap();
        const d = b.dataset.dir;
        if (d === "up") setDir(0, -1); else if (d === "down") setDir(0, 1);
        else if (d === "left") setDir(-1, 0); else if (d === "right") setDir(1, 0);
      });
    });
    document.getElementById("pauseBtn").addEventListener("click", () => {
      if (state === "playing") { state = "paused"; showOverlay("JEDA", "", "&#9654; TAP UNTUK LANJUT"); requestAnimationFrame(renderLoopIdle); }
      else if (state === "paused") primaryTap();
    });
    window.addEventListener("keydown", (e) => {
      const k = e.key;
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(k)) e.preventDefault();
      if (k === "ArrowUp" || k === "w") setDir(0, -1);
      else if (k === "ArrowDown" || k === "s") setDir(0, 1);
      else if (k === "ArrowLeft" || k === "a") setDir(-1, 0);
      else if (k === "ArrowRight" || k === "d") setDir(1, 0);
      else if (k === " ") primaryTap();
    });
    let tsx = 0, tsy = 0;
    arena.addEventListener("touchstart", (e) => { const t = e.touches[0]; tsx = t.clientX; tsy = t.clientY; }, { passive: true });
    arena.addEventListener("touchmove", (e) => { e.preventDefault(); }, { passive: false });
    arena.addEventListener("touchend", (e) => {
      const t = e.changedTouches[0]; const dx = t.clientX - tsx, dy = t.clientY - tsy;
      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) { primaryTap(); return; }
      if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0); else setDir(0, dy > 0 ? 1 : -1);
      if (state === "ready" || state === "over") startGame();
    }, { passive: true });

    // particles need updating every frame too -> fold into render via dt tracking
    let lastP = performance.now();
    (function pTick(now) { const dt = Math.min((now - lastP) / 1000, 0.05); lastP = now; updateParticles(dt); requestAnimationFrame(pTick); })(performance.now());

    // ---- Boot ----
    fitCamera();
    state = "ready";
    reset();
    showOverlay("SIAP MAIN?", "Geser layar atau pakai tombol arah.", "&#9654; TAP UNTUK MULAI");
    requestAnimationFrame(renderLoopIdle);

    if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
      window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
    }
  })();
  </script>
</body>
</html>
